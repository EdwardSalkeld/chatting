name: Lint

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  gofmt:
    name: Go Format
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go/handler/go.mod
          cache-dependency-path: go/handler/go.mod

      - name: Check gofmt
        working-directory: go/handler
        run: |
          files="$(gofmt -l .)"
          if [ -n "$files" ]; then
            echo "Go files need gofmt:"
            echo "$files"
            exit 1
          fi

  ruff:
    name: Ruff
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --locked

      - name: Run Ruff
        run: uv run ruff check app tests

  typecheck:
    name: Pyright
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --locked

      - name: Run Pyright
        run: uv run pyright app/
