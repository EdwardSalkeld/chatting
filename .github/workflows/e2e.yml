name: E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    name: End-to-End
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      greenmail:
        image: greenmail/standalone:2.1.2
        env:
          GREENMAIL_OPTS: "-Dgreenmail.setup.test.all -Dgreenmail.users=bot@chatting.local:dummy"
        ports:
          - 3025:3025
          - 3143:3143

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download bbmb-server
        run: |
          curl -fsSL \
            -o "${{ runner.temp }}/bbmb-server-linux-amd64" \
            https://github.com/EdwardSalkeld/bbmb/releases/latest/download/bbmb-server-linux-amd64
          curl -fsSL \
            -o "${{ runner.temp }}/bbmb-server-linux-amd64.sha256" \
            https://github.com/EdwardSalkeld/bbmb/releases/latest/download/bbmb-server-linux-amd64.sha256
          (
            cd "${{ runner.temp }}"
            sha256sum -c bbmb-server-linux-amd64.sha256
          )
          chmod +x "${{ runner.temp }}/bbmb-server-linux-amd64"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --locked

      - name: Wait for GreenMail
        run: |
          for i in $(seq 1 30); do
            if python3 -c "import socket; s=socket.socket(); s.settimeout(1); s.connect(('127.0.0.1',3143)); s.close()" 2>/dev/null; then
              echo "GreenMail IMAP is ready"
              exit 0
            fi
            sleep 1
          done
          echo "GreenMail failed to start"
          exit 1

      - name: Run E2E tests
        env:
          CHATTING_BBMB_SERVER_BIN: ${{ runner.temp }}/bbmb-server-linux-amd64
          CHATTING_IMAP_PASSWORD: dummy
          CHATTING_SMTP_PASSWORD: dummy
        run: uv run python -m unittest tests.e2e.test_email_e2e -v
