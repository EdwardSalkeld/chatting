services:
  bbmb:
    build:
      context: .
      dockerfile: Dockerfile.bbmb
    ports:
      - "9876:9876"
      - "9877:9877"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:9877/metrics"]
      interval: 5s
      timeout: 2s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  handler:
    build: 
      context: .
      dockerfile: Dockerfile
      target: prod
    command: ["app.main_message_handler"]
    env_file: configs/handler.env
    environment:
      CHATTING_MESSAGE_HANDLER_CONFIG_PATH: /config/handler.json
    volumes:
      - ./configs/handler:/config:ro
      - handler-data:/data
      - shared-temp:/tmp
      - gh-auth:/root/.config/gh
    ports:
      - "9464:9464"
    depends_on:
      bbmb:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: prod
    user: "${LOCAL_UID}:${LOCAL_GID}"
    command: ["app.main_worker"]
    env_file: configs/worker.env
    environment:
      CHATTING_WORKER_CONFIG_PATH: /config/worker.json
      HOME: /home/chatting
    volumes:
      - ./configs/worker:/config:ro
      - worker-data:/data
      - ${LOCAL_WORKSPACE}:/workspace
      - shared-temp:/tmp
      - codex-auth:/home/chatting/.codex
      - claude-auth:/home/chatting/.claude
      - gh-auth:/home/chatting/.config/gh
    depends_on:
      bbmb:
        condition: service_healthy
    restart: unless-stopped

volumes:
  handler-data:
  worker-data:
  shared-temp:
  codex-auth:
  claude-auth:
  gh-auth:
