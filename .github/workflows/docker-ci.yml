name: Docker CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Docker Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build test image
        run: docker build --target test -t chatting:test .

      - name: Verify bundled CLIs
        run: |
          docker run --rm --entrypoint codex chatting:test --version
          docker run --rm --entrypoint claude chatting:test --version
          docker run --rm chatting:test sh -lc 'uv --version && rg --version && go version'

      - name: Run unit tests
        run: |
          docker run --rm \
            chatting:test \
            uv run python -m unittest discover -s tests
