services:
  bbmb:
    build:
      context: .
      dockerfile: Dockerfile.bbmb
    ports:
      - "9876:9876"
      - "9877:9877"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:9877/metrics"]
      interval: 5s
      timeout: 2s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  handler:
    image: ${CHATTING_RUNTIME_IMAGE:-ghcr.io/edwardsalkeld/chatting:latest}
    entrypoint: ["/entrypoint.sh"]
    command: ["chatting-handler", "--config", "/config/handler.json"]
    env_file: configs/handler/handler.env
    environment:
      CHATTING_MESSAGE_HANDLER_CONFIG_PATH: /config/handler.json
      # Set PUID/PGID to your host user's UID/GID so the runtime user owns HOME.
      # Override by exporting UID and GID in your shell before running docker compose.
      PUID: "${UID:-1000}"
      PGID: "${GID:-1000}"
    volumes:
      - ./configs/handler:/config:ro
      - handler-data:/data
      - shared-temp:/tmp
      - gh-auth:/home/chatting/.config/gh
    ports:
      - "9464:9464"
    depends_on:
      bbmb:
        condition: service_healthy
    restart: unless-stopped

  worker:
    image: ${CHATTING_RUNTIME_IMAGE:-ghcr.io/edwardsalkeld/chatting:latest}
    entrypoint: ["/entrypoint.sh"]
    command: ["/app/.venv/bin/python", "-m", "app.main_worker"]
    env_file: configs/worker/worker.env
    environment:
      CHATTING_WORKER_CONFIG_PATH: /config/worker.json
      # Set PUID/PGID to your host user's UID/GID so the runtime user owns HOME.
      # Override by exporting UID and GID in your shell before running docker compose.
      PUID: "${UID:-1000}"
      PGID: "${GID:-1000}"
    volumes:
      - ./configs/worker:/config:ro
      - worker-data:/data
      - html-output:/workspace/html
      - shared-temp:/tmp
      - codex-auth:/home/chatting/.codex
      - claude-auth:/home/chatting/.claude
      - gh-auth:/home/chatting/.config/gh
    depends_on:
      bbmb:
        condition: service_healthy
    ports:
      - "9465:9465"
    restart: unless-stopped

  site:
    image: node:22-alpine
    working_dir: /site
    command:
      [
        "sh",
        "-lc",
        "npm install -g browser-sync@3 && browser-sync start --server /site --files /site --host 0.0.0.0 --port 9466 --no-open --no-ui --no-notify"
      ]
    volumes:
      - html-output:/site
    ports:
      - "9466:9466"
    restart: unless-stopped

volumes:
  handler-data:
  worker-data:
  html-output:
  shared-temp:
  codex-auth:
  claude-auth:
  gh-auth:
