services:
  bbmb:
    build:
      context: .
      dockerfile: Dockerfile.bbmb
    ports:
      - "9876:9876"
      - "9877:9877"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:9877/metrics"]
      interval: 5s
      timeout: 2s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  handler:
    build:
      context: .
      dockerfile: Dockerfile
      target: prod
    entrypoint: ["/entrypoint.sh"]
    command: ["/app/.venv/bin/python", "-m", "app.main_message_handler"]
    env_file: configs/handler.env
    environment:
      CHATTING_MESSAGE_HANDLER_CONFIG_PATH: /config/handler.json
      # Set PUID/PGID to your host user's UID/GID so the runtime user owns HOME.
      # Override by exporting UID and GID in your shell before running docker compose.
      PUID: "${UID:-1000}"
      PGID: "${GID:-1000}"
    volumes:
      - ./configs/handler:/config:ro
      - handler-data:/data
      - shared-temp:/tmp
      - gh-auth:/home/chatting/.config/gh
    ports:
      - "9464:9464"
    depends_on:
      bbmb:
        condition: service_healthy
    ports:
      - "9465:9465"
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: prod
    entrypoint: ["/entrypoint.sh"]
    command: ["/app/.venv/bin/python", "-m", "app.main_worker"]
    env_file: configs/worker.env
    environment:
      CHATTING_WORKER_CONFIG_PATH: /config/worker.json
      # Set PUID/PGID to your host user's UID/GID so the runtime user owns HOME.
      # Override by exporting UID and GID in your shell before running docker compose.
      PUID: "${UID:-1000}"
      PGID: "${GID:-1000}"
    volumes:
      - ./configs/worker:/config:ro
      - worker-data:/data
      - ${LOCAL_WORKSPACE}:/workspace
      - shared-temp:/tmp
      - codex-auth:/home/chatting/.codex
      - claude-auth:/home/chatting/.claude
      - gh-auth:/home/chatting/.config/gh
    depends_on:
      bbmb:
        condition: service_healthy
    restart: unless-stopped

volumes:
  handler-data:
  worker-data:
  shared-temp:
  codex-auth:
  claude-auth:
  gh-auth:
